{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-6">

        <div class="card shadow my-5">
            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <h4 class="text-gray-900">ایجاد حساب کاربری</h4>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary btn-block">
                        ثبت‌نام
                    </button>
                </form>

                <hr>

                <div class="text-center">
                    <a href="{% url 'login' %}">قبلاً ثبت‌نام کردی؟ ورود</a>
                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
